# Nginx 配置 - 发型迁移系统
# 部署路径: /opt/hairstyle-transfer-v5.3-release
# 域名: xn--gmq63iba0780e.com

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name xn--gmq63iba0780e.com www.xn--gmq63iba0780e.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--gmq63iba0780e.com www.xn--gmq63iba0780e.com;

    ssl_certificate /etc/letsencrypt/live/xn--gmq63iba0780e.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--gmq63iba0780e.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 微信校验文件
    location = /9JYQaEK2WM.txt {
        root /var/www/xn--gmq63iba0780e.com;
    }

    # 静态文件（图片、结果图等）
    # 注意：路径必须与实际文件存储位置一致
    location /static/ {
        alias /opt/hairstyle-transfer-v5.3-release/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件上传支持（图片上传）
        client_max_body_size 20M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # 推广二维码降级路由
    location /referral {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>发型迁移</title></head><body><p>请在微信中打开</p></body></html>';
    }

    # 聊天回复页面（管理员从企业微信点击链接进入）
    location /api/chat/reply {
        proxy_pass http://127.0.0.1:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 默认根路径
    location / {
        return 404;
    }

    # 日志
    access_log /var/log/nginx/hairstyle-access.log;
    error_log /var/log/nginx/hairstyle-error.log;
}
